services:
  postgres:
    image: postgres:16
    container_name: nail-salon-pos-postgres
    environment:
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
      POSTGRES_DB: salon_pos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon -d salon_pos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
